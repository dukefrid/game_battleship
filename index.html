<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BATTLESHIPS SLIM - FINAL FIXED</title>
    <style>
        :root { --bg: #0d1117; --grid: #161b22; --border: #30363d; --hit: #e94560; --miss: #444; }
        body { font-family: sans-serif; background: var(--bg); color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow: hidden; }
        .game-container { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; width: 95%; max-width: 900px; }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; }
        .status-panel { background: #21262d; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-size: 0.85rem; border: 1px solid var(--border); min-height: 20px; }
        .game-boards { display: flex; justify-content: center; gap: 20px; }
        .board-title { font-weight: bold; margin-bottom: 5px; font-size: 0.75rem; color: #aaa; }
        .grid { display: grid; grid-template-columns: repeat(10, 26px); grid-template-rows: repeat(10, 26px); background: var(--border); gap: 1px; border: 1px solid var(--border); }
        .cell { width: 26px; height: 26px; background: var(--grid); position: relative; cursor: pointer; }
        /* 명중/빗나감 스타일 */
        .cell.hit { background: var(--hit) !important; }
        .cell.hit::after { content: '×'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; }
        .cell.miss { background: var(--miss) !important; }
        .cell.miss::after { content: '·'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #888; }
        
        .ship-palette { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .palette-ship { background: #21262d; border: 1px solid #30363d; padding: 4px; border-radius: 4px; cursor: pointer; width: 80px; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; }
        .palette-ship.active { border-color: #58a6ff; background: #161b22; }
        .palette-ship.placed { opacity: 0.2; pointer-events: none; }
        .ship-preview { width: 100%; height: 18px; background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 2px; }
        
        .main-btn { margin-top: 10px; padding: 8px 25px; background: #238636; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .main-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="game-container">
    <h2>BATTLESHIPS COMMAND</h2>
    <div class="status-panel" id="status">함선을 선택하고 배치하십시오. (A/S키: 회전)</div>
    <div class="game-boards">
        <div class="board-wrapper">
            <div class="board-title">MY FLEET</div>
            <div id="player-grid" class="grid"></div>
        </div>
        <div class="board-wrapper" id="enemy-wrapper" style="opacity: 0.3; pointer-events: none;">
            <div class="board-title">ENEMY FLEET</div>
            <div id="enemy-grid" class="grid"></div>
        </div>
    </div>
    <div id="setup-area">
        <div class="ship-palette" id="palette"></div>
        <button class="main-btn" id="start-btn" onclick="startBattle()" disabled>START BATTLE</button>
    </div>
</div>

<script>
    const shipImgs = {};
    const shipsData = [
        { id: 'carrier', name: 'CARRIER', size: 5 },
        { id: 'battleship', name: 'BATTLESHIP', size: 4 },
        { id: 'frigate', name: 'FRIGATE', size: 3 },
        { id: 'submarine', name: 'SUBMARINE', size: 3, isYellow: true },
        { id: 'minesweeper', name: 'MINESWEEPER', size: 2 }
    ];

    function drawShip(ctx, ship, isVert) {
        const s = 26; const w = isVert ? s : s * ship.size; const h = isVert ? s * ship.size : s;
        ctx.fillStyle = ship.isYellow ? '#ffff00' : '#555';
        ctx.strokeStyle = '#fff';
        if (!isVert) {
            ctx.beginPath(); ctx.moveTo(0, 4); ctx.lineTo(w-10, 4); ctx.lineTo(w, s/2); ctx.lineTo(w-10, s-4); ctx.lineTo(0, s-4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.fillRect(w/2-6, 6, 12, 14);
        } else {
            ctx.beginPath(); ctx.moveTo(4, h); ctx.lineTo(4, 10); ctx.lineTo(s/2, 0); ctx.lineTo(s-4, 10); ctx.lineTo(s-4, h); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.fillRect(6, h/2-6, 14, 12);
        }
    }

    let gamePhase = 'setup', selectedIdx = -1, isVert = false;
    let playerData = Array(100).fill(0), enemyData = Array(100).fill(0);
    let playerShips = [], enemyShips = [];

    function init() {
        shipsData.forEach(ship => {
            const hC = document.createElement('canvas'); hC.width = 26 * ship.size; hC.height = 26;
            const vC = document.createElement('canvas'); vC.width = 26; vC.height = 26 * ship.size;
            drawShip(hC.getContext('2d'), ship, false); drawShip(vC.getContext('2d'), ship, true);
            shipImgs[ship.id + '_h'] = hC.toDataURL(); shipImgs[ship.id + '_v'] = vC.toDataURL();
        });
        
        const pGrid = document.getElementById('player-grid');
        const eGrid = document.getElementById('enemy-grid');
        for (let i = 0; i < 100; i++) {
            const pc = document.createElement('div'); pc.className = 'cell'; 
            pc.addEventListener('click', () => place(i));
            pGrid.appendChild(pc);
            
            const ec = document.createElement('div'); ec.className = 'cell'; 
            ec.addEventListener('click', () => attack(i));
            eGrid.appendChild(ec);
        }
        buildPalette();
        window.onkeydown = (e) => { if(e.key.toLowerCase()==='a' || e.key.toLowerCase()==='s') isVert = !isVert; };
    }

    function buildPalette() {
        const p = document.getElementById('palette');
        shipsData.forEach((s, i) => {
            const b = document.createElement('div'); b.className = 'palette-ship'; b.id = `p-${i}`;
            b.innerHTML = `<div class="ship-preview" style="background-image:url(${shipImgs[s.id + '_h']})"></div><span>${s.name}</span>`;
            b.onclick = () => { selectedIdx = i; document.querySelectorAll('.palette-ship').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
            p.appendChild(b);
        });
    }

    function place(idx) {
        if (selectedIdx === -1 || gamePhase !== 'setup') return;
        const s = shipsData[selectedIdx]; const r = Math.floor(idx/10); const c = idx%10; const pos = [];
        for (let i = 0; i < s.size; i++) {
            const nr = isVert ? r+i : r; const nc = isVert ? c : c+i;
            if (nr >= 10 || nc >= 10 || playerData[nr * 10 + nc]) return;
            pos.push(nr * 10 + nc);
        }
        pos.forEach(p => playerData[p] = 1);
        playerShips[selectedIdx] = { ...s, pos, v: isVert };
        pos.forEach((p, i) => {
            const cell = document.getElementById('player-grid').children[p];
            cell.style.backgroundImage = `url(${isVert ? shipImgs[s.id + '_v'] : shipImgs[s.id + '_h']})`;
            cell.style.backgroundPosition = isVert ? `0 -${i*26}px` : `-${i*26}px 0`;
        });
        document.getElementById(`p-${selectedIdx}`).classList.add('placed');
        selectedIdx = -1;
        if (playerShips.filter(Boolean).length === 5) document.getElementById('start-btn').disabled = false;
    }

    function startBattle() {
        gamePhase = 'battle';
        document.getElementById('setup-area').style.display = 'none';
        const eWrapper = document.getElementById('enemy-wrapper');
        eWrapper.style.opacity = '1';
        eWrapper.style.pointerEvents = 'auto'; // 클릭 차단 해제
        document.getElementById('status').innerText = "전투 시작! ENEMY 영토를 클릭하여 공격하십시오.";
        
        // 적군 배치 로직 강화
        shipsData.forEach(s => {
            let ok = false; while(!ok) {
                const v = Math.random() < 0.5; const r = Math.floor(Math.random()*10); const c = Math.floor(Math.random()*10); const pos = [];
                let fit = true; for(let i=0; i<s.size; i++) {
                    const nr = v ? r+i : r; const nc = v ? c+i : c;
                    if(nr>=10 || nc>=10 || enemyData[nr*10 + nc]) { fit = false; break; }
                    pos.push(nr*10 + nc);
                }
                if(fit) { pos.forEach(p => enemyData[p] = 1); enemyShips.push({ ...s, pos }); ok = true; }
            }
        });
    }

    function attack(idx) {
        if (gamePhase !== 'battle' || enemyData[idx] > 1) return;
        const cell = document.getElementById('enemy-grid').children[idx];
        if (enemyData[idx] === 1) {
            enemyData[idx] = 2; cell.classList.add('hit');
            const s = enemyShips.find(sh => sh.pos.includes(idx));
            if (s.pos.every(p => enemyData[p] === 2)) document.getElementById('status').innerText = `명중! 적의 ${s.name} 격침!`;
            else document.getElementById('status').innerText = "명중!";
        } else {
            enemyData[idx] = 3; cell.classList.add('miss');
            document.getElementById('status').innerText = "빗나갔습니다.";
        }
        
        // 승리 판정
        if (enemyShips.every(s => s.pos.every(p => enemyData[p] === 2))) {
            alert("전 승리! 모든 적함을 섬멸했습니다!"); location.reload();
        }
    }

    init();
</script>
</body>
</html>
