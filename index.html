<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배틀쉽 BATTLESHIPS v1.0 </title>
    <style>
        :root {
            --bg-color: #0d1117;
            --grid-color: #161b22;
            --border-color: #30363d;
            --hit-color: #e94560;
        }

        body { font-family: sans-serif; background-color: var(--bg-color); color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow: hidden; }
        .game-container { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; width: 95%; max-width: 900px; }
        
        /* 제목과 상태바 크기 축소 */
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #fff; }
        .status-panel { background: #21262d; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-size: 0.9rem; border: 1px solid var(--border-color); }
        
        .game-boards { display: flex; justify-content: center; gap: 20px; margin-top: 5px; }
        .board-title { font-weight: bold; margin-bottom: 8px; color: #aaa; font-size: 0.8rem; text-transform: uppercase; }

        /* 그리드 칸 크기를 32px -> 26px로 축소 */
        .grid { display: grid; grid-template-columns: repeat(10, 26px); grid-template-rows: repeat(10, 26px); background-color: var(--border-color); gap: 1px; border: 1px solid var(--border-color); }
        .cell { width: 26px; height: 26px; background-color: var(--grid-color); position: relative; background-repeat: no-repeat; }
        
        /* 함선 선택 팔레트 콤팩트화 */
        .ship-palette { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .palette-ship { 
            background: #21262d; border: 1px solid #30363d; padding: 5px; border-radius: 4px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; width: 85px; font-size: 0.7rem;
        }
        .palette-ship.selected { border: 2px solid #58a6ff; background: #161b22; }
        .palette-ship.placed { opacity: 0.2; filter: grayscale(1); }
        .ship-preview { width: 100%; height: 20px; background-position: center; background-repeat: no-repeat; background-size: contain; margin-bottom: 3px; }

        .main-btn { margin-top: 15px; padding: 8px 30px; font-size: 0.9rem; cursor: pointer; background: #238636; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .main-btn:disabled { opacity: 0.3; }

        .setup-phase .battle-only { display: none; }
        .battle-phase .setup-only { display: none; }
    </style>
</head>
<body class="setup-phase">

<div class="game-container">
    <h2>BATTLESHIPS</h2>
    <div class="status-panel" id="status-msg">함대를 배치하십시오 (A/S키: 회전)</div>

    <div class="game-boards">
        <div class="board-wrapper">
            <div class="board-title">PLAYER</div>
            <div id="player-grid" class="grid"></div>
        </div>
        <div class="board-wrapper battle-only">
            <div class="board-title">ENEMY</div>
            <div id="enemy-grid" class="grid"></div>
        </div>
    </div>

    <div class="setup-only">
        <div class="ship-palette" id="ship-palette"></div>
        <button class="main-btn" id="start-battle-btn" onclick="startBattle()" disabled>START BATTLE</button>
    </div>
</div>

<script>
    // --- ⚓ 이미지 렌더링 (슬림 버전) ⚓ ---
    const shipImgs = {};
    const shipsData = [
        { id: 'carrier', name: 'CARRIER', size: 5 },
        { id: 'battleship', name: 'BATTLESHIP', size: 4 },
        { id: 'frigate', name: 'FRIGATE', size: 3 },
        { id: 'submarine', name: 'SUBMARINE', size: 3, isYellow: true },
        { id: 'minesweeper', name: 'MINESWEEPER', size: 2 }
    ];

    function drawShip(ctx, ship, isVert) {
        const s = 26; const w = isVert ? s : s * ship.size; const h = isVert ? s * ship.size : s;
        ctx.fillStyle = ship.isYellow ? '#ffff00' : '#555';
        ctx.strokeStyle = '#fff';
        if (!isVert) {
            ctx.beginPath(); ctx.moveTo(0, 4); ctx.lineTo(w-10, 4); ctx.lineTo(w, s/2); ctx.lineTo(w-10, s-4); ctx.lineTo(0, s-4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.fillRect(w/2-6, 6, 12, 14);
        } else {
            ctx.beginPath(); ctx.moveTo(4, h); ctx.lineTo(4, 10); ctx.lineTo(s/2, 0); ctx.lineTo(s-4, 10); ctx.lineTo(s-4, h); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.fillRect(6, h/2-6, 14, 12);
        }
    }

    let gamePhase = 'setup', selectedIdx = -1, isVert = false;
    let playerData = Array(10).fill().map(() => Array(10).fill(0));
    let playerShips = [];

    function init() {
        shipsData.forEach(ship => {
            const hC = document.createElement('canvas'); hC.width = 26 * ship.size; hC.height = 26;
            const vC = document.createElement('canvas'); vC.width = 26; vC.height = 26 * ship.size;
            drawShip(hC.getContext('2d'), ship, false); drawShip(vC.getContext('2d'), ship, true);
            shipImgs[ship.id + '_h'] = hC.toDataURL(); shipImgs[ship.id + '_v'] = vC.toDataURL();
        });
        buildPalette(); render();
        window.onkeydown = (e) => { if(gamePhase === 'setup' && (e.key.toLowerCase()==='a' || e.key.toLowerCase()==='s')) isVert = !isVert; };
    }

    function buildPalette() {
        const p = document.getElementById('ship-palette'); p.innerHTML = '';
        shipsData.forEach((s, i) => {
            const b = document.createElement('div'); b.className = 'palette-ship'; b.id = `p-${s.id}`;
            b.innerHTML = `<div class="ship-preview" style="background-image:url(${shipImgs[s.id + '_h']})"></div><span>${s.name}</span>`;
            b.onclick = () => { selectedIdx = i; document.querySelectorAll('.palette-ship').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };
            p.appendChild(b);
        });
    }

    function render() {
        const g = document.getElementById('player-grid'); g.innerHTML = '';
        for(let r=0; r<10; r++) for(let c=0; c<10; c++) {
            const cell = document.createElement('div'); cell.className = 'cell';
            const sh = playerShips.find(s => s && s.pos.some(p => p.r === r && p.c === c));
            if(sh) {
                cell.style.backgroundImage = `url(${sh.v ? shipImgs[sh.id + '_v'] : shipImgs[sh.id + '_h']})`;
                const pi = sh.pos.findIndex(p => p.r === r && p.c === c);
                cell.style.backgroundPosition = sh.v ? `0 -${pi*26}px` : `-${pi*26}px 0`;
                cell.style.backgroundSize = 'auto';
            }
            cell.onclick = () => place(r, c);
            g.appendChild(cell);
        }
    }

    function place(r, c) {
        if(selectedIdx === -1) return;
        const s = shipsData[selectedIdx];
        const p = [];
        for(let i=0; i<s.size; i++) {
            const nr = isVert ? r+i : r, nc = isVert ? c : c+i;
            if(nr>=10 || nc>=10 || playerData[nr][nc]) return;
            p.push({r: nr, c: nc});
        }
        p.forEach(pos => playerData[pos.r][pos.c] = 1);
        playerShips[selectedIdx] = { ...s, pos: p, v: isVert };
        document.getElementById(`p-${s.id}`).classList.add('placed');
        selectedIdx = -1; render();
        if(playerShips.filter(Boolean).length === 5) document.getElementById('start-battle-btn').disabled = false;
    }

    function startBattle() { 
        gamePhase = 'battle'; document.body.className = 'battle-phase'; 
        document.getElementById('status-msg').innerText = "전투 시작! 적의 함선을 찾으십시오.";
        document.querySelector('.battle-only').style.display = 'block';
    }

    init();
</script>
</body>
</html>
