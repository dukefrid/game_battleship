<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BATTLESHIPS: DEPLOY YOUR FLEET</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --grid-color: #161b22;
            --border-color: #30363d;
            --hit-color: #e94560;
            --miss-color: #f9f9f9;
            --valid-hint: rgba(100, 255, 100, 0.4);
            --invalid-hint: rgba(255, 100, 100, 0.4);
        }

        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden;}
        .game-container { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 1050px; position: relative;}
        .header h1 { margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); letter-spacing: 2px; text-transform: uppercase;}
        
        .status-panel { background: rgba(33, 38, 45, 0.8); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; border: 1px solid var(--border-color);}
        
        .game-boards { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 10px;}
        .board-wrapper { display: flex; flex-direction: column; align-items: center; }
        .board-title { font-weight: bold; margin-bottom: 15px; color: #aaa; font-size: 1rem; letter-spacing: 1px; text-transform: uppercase;}

        .grid-container { display: flex; }
        .labels-y { display: grid; grid-template-rows: repeat(10, 32px); margin-right: 8px; align-items: center; color: #555; font-size: 0.8rem; font-weight: bold;}
        
        .grid { display: grid; grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); background-color: var(--grid-color); border: 2px solid var(--border-color); gap: 1px; position: relative; }
        .cell { width: 32px; height: 32px; background-color: rgba(255,255,255,0.02); box-sizing: border-box; position: relative; background-repeat: no-repeat; background-size: auto; }
        
        #player-grid .cell.hint-valid { background-color: var(--valid-hint) !important; cursor: pointer; }
        #player-grid .cell.hint-invalid { background-color: var(--invalid-hint) !important; cursor: not-allowed; }

        .cell.hit { animation: hitExplosion 0.4s ease-out forwards; background-image: none !important;}
        .cell.hit::after { content: '×'; position: absolute; color: #fff; font-size: 1.5rem; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .cell.miss { background-color: rgba(255,255,255,0.1) !important; background-image: none !important;}
        .cell.miss::after { content: '●'; position: absolute; color: #aaa; font-size: 0.6rem; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.5;}

        @keyframes hitExplosion { 0% { scale: 0.5; opacity: 0; } 50% { scale: 1.2; opacity: 1; background: #ffcc00; } 100% { scale: 1; opacity: 1; background: var(--hit-color); } }
        @keyframes shipSunk { 0% { filter: brightness(1) sepia(0); } 100% { filter: brightness(0.5) sepia(1) saturate(5) hue-rotate(-50deg); } }
        .cell.ship-sunk { animation: shipSunk 1s infinite alternate; }

        #missile-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; width: 100%; height: 100%;}

        .setup-area { margin-top: 30px; background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box;}
        .ship-palette { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;}
        
        .palette-ship { 
            background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px; width: 130px;
        }
        .palette-ship.selected { border: 2px solid #58a6ff; background: #161b22; color: #fff; box-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }
        .palette-ship.placed { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .ship-preview { width: 100%; height: 40px; background-position: center; background-repeat: no-repeat; background-size: contain; }

        .instr { font-size: 0.85rem; color: #888; line-height: 1.6; text-align: left; padding: 10px; border-left: 3px solid #ffcc00; background: rgba(255,255,255,0.03);}
        
        /* 메인 버튼 스타일 */
        button.main-btn { padding: 12px 40px; font-size: 1.1rem; cursor: pointer; background: #238636; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button.main-btn:hover:not(:disabled) { background: #2ea043; transform: translateY(-2px); }
        button.main-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 좌측에 위치할 전투 시작 버튼의 컨테이너 */
        .start-btn-wrapper { display: flex; align-items: center; padding-top: 30px; margin-right: 10px; }
        .start-btn-wrapper button { padding: 20px 25px; font-size: 1.2rem; white-space: nowrap; box-shadow: 0 4px 15px rgba(35, 134, 54, 0.4); }

        .setup-phase .battle-only { display: none; }
        .battle-phase .setup-only { display: none; }
    </style>
</head>
<body class="setup-phase">

<div class="game-container">
    <div class="header"><h1>BATTLESHIPS COMMAND</h1></div>
    <canvas id="missile-canvas"></canvas>
    
    <div class="status-panel">
        <div id="status-msg" class="setup-only">함대를 배치하십시오 (항공모함부터 시작)</div>
        <div class="battle-only" style="display:none; justify-content:space-around; width:100%;">
            <div>턴(TURN): <span id="turn-text" style="color:#ffcc00">PLAYER</span></div>
            <div>적함 격침: <span id="enemy-ships-left">5</span>/5</div>
        </div>
    </div>

    <div class="game-boards">
        <div class="start-btn-wrapper setup-only">
            <button class="main-btn" id="start-battle-btn" onclick="startBattle()" disabled>전투 시작<br>(START)</button>
        </div>

        <div class="board-wrapper">
            <div class="board-title">나의 함대 (PLAYER FLEET)</div>
            <div class="grid-container">
                <div id="player-labels-y" class="labels-y labels"></div>
                <div id="player-grid" class="grid"></div>
            </div>
        </div>
        
        <div class="board-wrapper battle-only">
            <div class="board-title">적 함대 (ENEMY FLEET)</div>
            <div class="grid-container">
                <div id="enemy-labels-y" class="labels-y labels"></div>
                <div id="enemy-grid" class="grid"></div>
            </div>
        </div>
    </div>

    <div class="setup-area setup-only">
        <div class="ship-palette" id="ship-palette"></div>
        <div class="instr">
            1. 목록에서 배를 선택합니다.<br>
            2. 내 그리드 위에서 **키보드 [A], [S] 키**로 회전(가로/세로)시킵니다.<br>
            3. 원하는 위치에서 클릭하여 배치합니다. (모든 배 배치 후 '전투 시작' 버튼 클릭)
        </div>
    </div>
    <button class="main-btn battle-only" id="reset-btn" onclick="location.reload()" style="display:none; background:#444; margin-top:20px;">새 게임 시작</button>
</div>

<script>
    // --- ⚓ 나노 바나나 2 렌더링 엔진 ⚓ ---
    const shipImgs = {};
    // 함선 이름을 모두 한글로 변경했습니다.
    const shipsData = [
        { id: 'carrier', name: '항공모함', size: 5 },
        { id: 'battleship', name: '전함', size: 4 },
        { id: 'destroyer', name: '구축함', size: 3 },
        { id: 'submarine', name: '잠수함', size: 3, isYellow: true }, // 노란색 잠수함 반영
        { id: 'patrol', name: '순찰함', size: 2 }
    ];

    function drawPixelArtShip(ctx, ship, isVert) {
        const s = 32; const w = isVert ? s : s * ship.size; const h = isVert ? s * ship.size : s;
        ctx.fillStyle = ship.isYellow ? '#ffff00' : '#444'; // 노란색 잠수함 반영
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
        if (!isVert) {
            ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(w - 15, 5); ctx.lineTo(w, s/2); ctx.lineTo(w - 15, s - 5); ctx.lineTo(0, s - 5); ctx.closePath(); ctx.fill(); ctx.stroke();
            if(ship.id === 'carrier') { ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(10, s/2-1, w-20, 2); } // 갑판선
            ctx.fillStyle = '#111'; ctx.fillRect(w/2 - 10, 8, 20, 16); // 함교
        } else {
            ctx.beginPath(); ctx.moveTo(5, h); ctx.lineTo(5, 15); ctx.lineTo(s/2, 0); ctx.lineTo(s - 5, 15); ctx.lineTo(s - 5, h); ctx.closePath(); ctx.fill(); ctx.stroke();
            if(ship.id === 'carrier') { ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(s/2-1, 10, 2, h-20); } // 갑판선
            ctx.fillStyle = '#111'; ctx.fillRect(8, h/2 - 10, 16, 20); // 함교
        }
    }

    // --- 게임 로직 ---
    let gamePhase = 'setup', playerTurn = true, selectedShipIdx = -1, isVertical = false;
    let playerData = Array(10).fill().map(() => Array(10).fill(0));
    let enemyData = Array(10).fill().map(() => Array(10).fill(0));
    let playerShips = [], enemyShips = [];

    const canvas = document.getElementById('missile-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function init() {
        shipsData.forEach(ship => {
            const hC = document.createElement('canvas'); const vC = document.createElement('canvas');
            hC.width = 32 * ship.size; hC.height = 32; vC.width = 32; vC.height = 32 * ship.size;
            drawPixelArtShip(hC.getContext('2d'), ship, false); drawPixelArtShip(vC.getContext('2d'), ship, true);
            shipImgs[ship.id + '_h'] = hC.toDataURL(); shipImgs[ship.id + '_v'] = vC.toDataURL();
        });

        const yl = (t) => document.getElementById(`${t}-labels-y`);
        for(let i=0; i<10; i++) {
            ['player', 'enemy'].forEach(t => {
                const y = document.createElement('div'); y.innerText = i+1; yl(t).appendChild(y);
            });
        }
        buildPalette(); render();
        window.onkeydown = (e) => {
            if(gamePhase === 'setup' && (e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 's')) {
                isVertical = !isVertical;
                const h = document.querySelector('#player-grid .cell:hover');
                if(h) { const idx = Array.from(h.parentNode.children).indexOf(h); hover(Math.floor(idx/10), idx%10); }
            }
        };
    }

    function buildPalette() {
        const p = document.getElementById('ship-palette'); p.innerHTML = '';
        shipsData.forEach((s, i) => {
            const b = document.createElement('div'); b.className = 'palette-ship'; b.id = `p-${s.id}`;
            b.innerHTML = `<div class="ship-preview" style="background-image:url(${shipImgs[s.id + '_h']})"></div><span>${s.name}</span>`;
            b.onclick = () => { if(!playerShips[i] && gamePhase === 'setup') { selectedShipIdx = i; document.querySelectorAll('.palette-ship').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); render(); } };
            p.appendChild(b);
        });
    }

    function render() {
        ['player', 'enemy'].forEach(t => {
            const g = document.getElementById(`${t}-grid`); g.innerHTML = '';
            const d = (t === 'player' ? playerData : enemyData);
            for(let r=0; r<10; r++) for(let c=0; c<10; c++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if(t === 'player') {
                    const sh = playerShips.find(s => s && s.pos.some(p => p.r === r && p.c === c));
                    if(sh) {
                        cell.style.backgroundImage = `url(${sh.v ? shipImgs[sh.id + '_v'] : shipImgs[sh.id + '_h']})`;
                        const pi = sh.pos.findIndex(p => p.r === r && p.c === c);
                        cell.style.backgroundPosition = sh.v ? `0 -${pi*32}px` : `-${pi*32}px 0`;
                        if(sh.sunk) cell.classList.add('ship-sunk');
                    }
                    if(gamePhase === 'setup' && selectedShipIdx !== -1) {
                        cell.onmouseover = () => hover(r, c); cell.onmouseout = clearHover; cell.onclick = () => place(r, c);
                    }
                } else if(gamePhase === 'battle' && playerTurn && d[r][c] < 2) {
                    cell.onclick = (e) => attack(r, c, e);
                }
                if(d[r][c] === 2) cell.classList.add('hit'); else if(d[r][c] === 3) cell.classList.add('miss');
                g.appendChild(cell);
            }
        });
        document.getElementById('enemy-ships-left').innerText = 5 - enemyShips.filter(s => s.sunk).length;
    }

    function hover(r, c) {
        clearHover(); if(selectedShipIdx === -1) return;
        const s = shipsData[selectedShipIdx].size; const valid = can(playerData, r, c, s, isVertical);
        for(let i=0; i<s; i++) {
            const nr = isVertical ? r+i : r, nc = isVertical ? c : c+i;
            if(nr<10 && nc<10) {
                const cell = document.getElementById('player-grid').children[nr*10 + nc];
                cell.classList.add(valid ? 'hint-valid' : 'hint-invalid');
                if(valid) {
                    cell.style.backgroundImage = `url(${shipImgs[shipsData[selectedShipIdx].id + (isVertical ? '_v' : '_h')]})`;
                    cell.style.backgroundPosition = isVertical ? `0 -${i*32}px` : `-${i*32}px 0`;
                    cell.style.opacity = '0.4';
                }
            }
        }
    }

    function clearHover() { document.querySelectorAll('#player-grid .cell').forEach(c => { c.classList.remove('hint-valid', 'hint-invalid'); if(c.style.opacity === '0.4') { c.style.backgroundImage = ''; c.style.opacity = '1'; } }); renderPlayerShipsOnly(); }

    function renderPlayerShipsOnly() {
        for(let r=0; r<10; r++) for(let c=0; c<10; c++) {
            const cell = document.getElementById('player-grid').children[r*10 + c];
            const sh = playerShips.find(s => s && s.pos.some(p => p.r === r && p.c === c));
            if(sh) {
                const pi = sh.pos.findIndex(p => p.r === r && p.c === c);
                cell.style.backgroundImage = `url(${sh.v ? shipImgs[sh.id + '_v'] : shipImgs[sh.id + '_h']})`;
                cell.style.backgroundPosition = sh.v ? `0 -${pi*32}px` : `-${pi*32}px 0`;
            } else if(playerData[r][c] < 2) { cell.style.backgroundImage = ''; }
        }
    }

    function can(g, r, c, s, v) { if(v) { if(r+s > 10) return false; for(let i=0; i<s; i++) if(g[r+i][c]) return false; } else { if(c+s > 10) return false; for(let i=0; i<s; i++) if(g[r][c+i]) return false; } return true; }

    function place(r, c) {
        if(selectedShipIdx === -1) return;
        const s = shipsData[selectedShipIdx]; if(!can(playerData, r, c, s.size, isVertical)) return;
        const p = []; for(let i=0; i<s.size; i++) { const nr = isVertical ? r+i : r, nc = isVertical ? c : c+i; playerData[nr][nc] = 1; p.push({r: nr, c: nc, h: false}); }
        playerShips[selectedShipIdx] = { ...s, pos: p, sunk: false, v: isVertical };
        document.getElementById(`p-${s.id}`).classList.add('placed');
        selectedShipIdx = -1; clearHover(); render();
        if(playerShips.filter(Boolean).length === 5) document.getElementById('start-battle-btn').disabled = false;
    }

    function startBattle() { gamePhase = 'battle'; document.body.className = 'battle-phase'; setEnemy(); render(); }
    function setEnemy() { shipsData.forEach((s, i) => { let ok = false; while(!ok) { const v = Math.random() < 0.5, r = Math.floor(Math.random()*10), c = Math.floor(Math.random()*10); if(can(enemyData, r, c, s.size, v)) { const p = []; for(let j=0; j<s.size; j++) { const nr = v ? r+j : r, nc = v ? c : c+j; enemyData[nr][nc] = 1; p.push({r: nr, c: nc, h: false}); } enemyShips[i] = { ...s, pos: p, sunk: false, v: v }; ok = true; } } }); }
    function attack(r, c, e) { if(!playerTurn || gamePhase !== 'battle') return; playerTurn = false; const rect = e.target.getBoundingClientRect(); anim(window.innerWidth*0.1, window.innerHeight*0.9, rect.left+16, rect.top+16, () => { if(enemyData[r][c] === 1) { enemyData[r][c] = 2; checkSunk(enemyShips, r, c, 'enemy'); } else enemyData[r][c] = 3; render(); if(!win()) setTimeout(comp, 600); }); }
    function anim(sx, sy, ex, ey, cb) { let f = 0; function step() { f++; const p = f/25; const x = sx+(ex-sx)*p, y = sy+(ey-sy)*p - (300*Math.sin(Math.PI*p)); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.beginPath(); ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3; ctx.moveTo(sx, sy); ctx.quadraticCurveTo((sx+ex)/2, sy-400, x, y); ctx.stroke(); if(f<25) requestAnimationFrame(step); else { ctx.clearRect(0,0,canvas.width,canvas.height); cb(); } } step(); }
    function comp() { if(gamePhase !== 'battle') return; let r, c; do { r=Math.floor(Math.random()*10); c=Math.floor(Math.random()*10); } while(playerData[r][c] >= 2); if(playerData[r][c] === 1) { playerData[r][c] = 2; checkSunk(playerShips, r, c, 'player'); } else playerData[r][c] = 3; playerTurn = true; render(); win(); }
    function checkSunk(ary, r, c, type) { ary.forEach(s => { if(!s || s.sunk) return; if(s.pos.some(p => p.r === r && p.c === c)) { const hits = s.pos.filter(p => (type === 'enemy' ? enemyData : playerData)[p.r][p.c] === 2).length; if(hits === s.size) { s.sunk = true; if(type === 'player') setTimeout(() => alert(`💀 패배: 내 군함 ${s.name} 격침...`), 100); else setTimeout(() => alert(`🎊 승리! 적 군함 ${s.name} 격침!`), 100); } } }); }
    function win() { const eS = enemyShips.filter(s => s && s.sunk).length, pS = playerShips.filter(s => s && s.sunk).length; if(eS === 5) { endGame('승리자: PLAYER (나의 승리!)'); return true; } if(pS === 5) { endGame('승리자: COMPUTER (적군의 승리...)'); return true; } return false; }
    function endGame(m) { gamePhase = 'over'; render(); setTimeout(() => alert(m), 300); document.getElementById('reset-btn').style.display = 'inline-block'; }
    init();
</script>
</body>
</html>
